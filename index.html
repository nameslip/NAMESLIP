<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Book Cover Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .main-container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 500px;
            width: 100%;
            text-align: center;
            margin-bottom: 25px;
        }

        /* 🎯 നിങ്ങളുടെ ഒറിജിനൽ ATAVA ലോഗോ റൗണ്ടിൽ കൃത്യമായി കാണാനുള്ള സ്റ്റൈൽ */
        .company-logo-container {
            margin-bottom: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .company-logo {
            width: 100px; 
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #d4af37; /* ഗോൾഡ് ബോർഡർ */
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            background-color: #161616;
        }

        h1 { color: #333; font-size: 24px; margin-bottom: 5px; margin-top: 10px; }
        p { color: #666; margin-top: 0; font-size: 14px; }

        .form-container { display: flex; flex-direction: column; gap: 12px; margin-top: 15px; }
        .input-group { display: flex; flex-direction: column; text-align: left; gap: 5px; }
        .input-group label { font-weight: bold; color: #444; font-size: 14px; }
        .input-group input, .input-group textarea { padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-family: inherit; outline: none; }

        .print-btn {
            background-color: #5d6bca;
            color: white;
            border: none;
            padding: 12px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
        }

        .preview-area {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .a4-page {
            background: white;
            width: 210mm;
            height: 297mm;
            padding: 10mm; 
            box-sizing: border-box;
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            grid-template-rows: repeat(4, 1fr);    
            gap: 8mm; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .book-cover {
            width: 100%;
            height: 62mm; 
            background-size: cover;      
            background-position: center; 
            background-repeat: no-repeat;
            border-radius: 8px; 
            overflow: hidden;
            position: relative;
            border: 1px solid #ddd; 
        }

        .cover-overlay {
            background: rgba(0, 0, 0, 0.4); 
            width: 100%;
            height: 100%;
            padding: 10px 15px; 
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .top-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .photo-box img {
            width: 45px;  
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
            border: 1.5px solid white;
        }

        .student-info {
            text-align: right;
            color: white;
        }

        .student-info h2 {
            margin: 0;
            font-size: 13px; 
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.8);
        }

        .student-info p {
            margin: 1px 0 0 0;
            color: #e0e0e0;
            font-size: 10px;
        }

        .subject-section {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
        }

        .sub-title h3 {
            margin: 0;
            color: white;
            font-size: 18px; 
            font-weight: bold;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8);
            letter-spacing: 1px;
        }

        .footer-section {
            text-align: center;
            color: white;
        }

        .line {
            border: 0;
            height: 1px;
            background: rgba(255, 255, 255, 0.2);
            margin-bottom: 5px;
        }

        .footer-section h4 {
            margin: 0;
            font-size: 10px; 
            color: #dfdfdf;
        }

        .brand-name {
            font-size: 8px; 
            color: rgba(255, 255, 255, 0.5); 
            margin-top: 4px;
            text-align: center;
            letter-spacing: 0.5px;
        }

        @media print {
            html, body { background: white !important; margin: 0 !important; padding: 0 !important; }
            .main-container { display: none !important; }
            .a4-page { box-shadow: none !important; page-break-after: always !important; }
            .book-cover { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="company-logo-container">
            <img class="company-logo" id="mainLogo" src="LOGO 2.jpg" alt="ATAVA Logo">
        </div>

        <h1>📚 Book Cover Generator</h1>
        <p>വിവരങ്ങൾ നൽകി പ്രൊഫഷണൽ കവർ പേജ് ഉണ്ടാക്കൂ!</p>
        
        <div class="form-container">
            <div class="input-group">
                <label>Student Photo:</label>
                <input type="file" id="inputPhoto" accept="image/*" onchange="loadPhoto(event)">
            </div>
            <div class="input-group">
                <label>Custom Backgrounds (Select Multiple):</label>
                <input type="file" id="inputBg" accept="image/*" multiple onchange="loadMultipleBackgrounds(event)">
            </div>
            <div class="input-group">
                <label>Student Name:</label>
                <input type="text" id="inputName" placeholder="Enter Student Name" oninput="updateCovers()">
            </div>
            <div class="input-group">
                <label>Class:</label>
                <input type="text" id="inputClass" placeholder="e.g., 4 A" oninput="updateCovers()">
            </div>
            <div class="input-group">
                <label>Roll No:</label>
                <input type="text" id="inputRoll" placeholder="e.g., 10" oninput="updateCovers()">
            </div>
            <div class="input-group">
                <label>Subjects (One per line):</label>
                <textarea id="inputSubjects" rows="4" placeholder="MATHEMATICS&#10;ISLAMIC&#10;ENGLISH" oninput="updateCovers()"></textarea>
            </div>
            <div class="input-group">
                <label>School:</label>
                <input type="text" id="inputSchool" placeholder="Enter School Name" oninput="updateCovers()">
            </div>
            
            <button class="print-btn" onclick="window.print()">🖨️ Download / Print Cover</button>
        </div>
    </div>

    <div class="preview-container">
        <div id="printArea" class="preview-area"></div>
    </div>

    <script>
        let studentPhotoData = "https://via.placeholder.com/150";
        let customBgList = ["https://images.unsplash.com/photo-1511497584788-876760111969?q=80&w=1000&auto=format&fit=crop"];

        // ലോഗോ ഫയൽ നെയിമുകളിൽ എന്തെങ്കിലും തെറ്റുണ്ടെങ്കിൽ അത് ഓട്ടോമാറ്റിക്കായി തിരുത്താൻ
        const logoImg = document.getElementById('mainLogo');
        logoImg.onerror = function() {
            if (this.src.includes("LOGO%202.jpg.jpg")) {
                this.src = "logo 2.jpg";
            } else if (this.src.includes("LOGO%202.jpg")) {
                this.src = "LOGO 2.jpg.jpg";
            }
        };

        function updateCovers() {
            const name = document.getElementById('inputName').value || "";
            const className = document.getElementById('inputClass').value ? "Class: " + document.getElementById('inputClass').value : "";
            const roll = document.getElementById('inputRoll').value ? "Roll: " + document.getElementById('inputRoll').value : "";
            const school = document.getElementById('inputSchool').value.toUpperCase() || "";
            
            const subjectsText = document.getElementById('inputSubjects').value;
            let subjects = subjectsText.split('\n').filter(sub => sub.trim() !== "");
            
            if(subjects.length === 0) {
                subjects = ["MATHEMATICS", "ISLAMIC", "ENGLISH"]; 
            }

            const printArea = document.getElementById('printArea');
            printArea.innerHTML = ""; 

            let currentPage;
            const slipsPerPage = 8; 

            subjects.forEach((subject, index) => {
                if (index % slipsPerPage === 0) {
                    currentPage = document.createElement('div');
                    currentPage.className = 'a4-page';
                    printArea.appendChild(currentPage);
                }

                const currentBg = customBgList[index % customBgList.length];

                let infoLine = "";
                if (className || roll) {
                    infoLine = `${className} ${className && roll ? '|' : ''} ${roll}`;
                }

                const slipHtml = `
                    <div class="book-cover" style="background-image: url('${currentBg}');">
                        <div class="cover-overlay">
                            <div class="top-section">
                                <div class="photo-box">
                                    <img src="${studentPhotoData}" alt="Student">
                                </div>
                                <div class="student-info">
                                    <h2>${name}</h2>
                                    <p>${infoLine}</p>
                                </div>
                            </div>
                            <div class="subject-section">
                                <div class="sub-title">
                                    <h3>${subject.toUpperCase()}</h3>
                                </div>
                            </div>
                            <div class="footer-section">
                                <hr class="line">
                                <h4>${school}</h4>
                                <div class="brand-name">⚡ Powered by ATAVA</div>
                            </div>
                        </div>
                    </div>
                `;
                currentPage.innerHTML += slipHtml;
            });
        }

        function loadPhoto(event) {
            var reader = new FileReader();
            reader.onload = function() {
                studentPhotoData = reader.result;
                updateCovers();
            }
            if(event.target.files[0]) {
                reader.readAsDataURL(event.target.files[0]);
            }
        }

        function loadMultipleBackgrounds(event) {
            const files = event.target.files;
            if (files.length === 0) return;

            customBgList = []; 
            let loadedCount = 0;

            for (let i = 0; i < files.length; i++) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    customBgList.push(e.target.result);
                    loadedCount++;
                    if (loadedCount === files.length) {
                        updateCovers();
                    }
                }
                reader.readAsDataURL(files[i]);
            }
        }

        window.onload = updateCovers;
    </script>
</body>
</html>
