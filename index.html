<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Book Cover Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .main-container {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 500px;
            width: 100%;
            text-align: center;
            margin-bottom: 25px;
        }

        h1 { color: #333; font-size: 24px; margin-bottom: 5px; }
        p { color: #666; margin-top: 0; font-size: 14px; }

        .form-container { display: flex; flex-direction: column; gap: 12px; margin-top: 15px; }
        .input-group { display: flex; flex-direction: column; text-align: left; gap: 5px; }
        .input-group label { font-weight: 600; color: #444; font-size: 14px; }
        .input-group input, .input-group textarea { padding: 10px; border: 1px solid #ccc; border-radius: 6px; outline: none; font-family: inherit; }
        .help-text { font-size: 11px; color: #888; margin-top: -3px; }

        .print-btn {
            background-color: #5d6bca;
            color: white;
            border: none;
            padding: 12px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
        }

        .preview-area {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .a4-page {
            background: white;
            width: 210mm;
            height: 297mm;
            padding: 10mm; 
            box-sizing: border-box;
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            grid-template-rows: repeat(4, 1fr);    
            gap: 8mm; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            border-radius: 8px;
        }

        /* 1. ചിത്രത്തിന്റെ ക്വാളിറ്റി കൂട്ടാൻ ഇത് മാറ്റുക */
.book-cover {
    width: 100%;
    height: 62mm; 
    background-size: cover;      /* ചിത്രം കാർഡിന് പാകത്തിന് കൃത്യമായി വരാൻ */
    background-position: center; /* ചിത്രത്തിന്റെ നടുഭാഗം കൃത്യമായി കാണിക്കാൻ */
    background-repeat: no-repeat;
    border-radius: 8px; 
    overflow: hidden;
    position: relative;
    border: 1px solid #ddd; 
}

/* 2. ബാക്ക്ഗ്രൗണ്ട് തെളിഞ്ഞു കാണാൻ ഈ ഒപ്പസിറ്റി (0.35) കുറച്ച കോഡ് മാറ്റുക */
.cover-overlay {
    background: rgba(0, 0, 0, 0.35); /* ഇവിടെ 0.78 എന്നത് മാറ്റി 0.35 ആക്കി കട്ടി കുറച്ചു */
    width: 100%;
    height: 100%;
    padding: 10px 15px; 
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
}
        .top-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .photo-box img {
            width: 40px;  
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 1.5px solid white;
        }

        .student-info {
            text-align: right;
            color: white;
        }

        .student-info h2 {
            margin: 0;
            font-size: 13px; 
            font-weight: 700;
        }

        .student-info p {
            margin: 1px 0 0 0;
            color: #e0e0e0;
            font-size: 10px;
            font-weight: 600;
        }

        .subject-section {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
        }

        .sub-title {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sub-title .icon {
            font-size: 18px; 
        }

        .sub-title h3 {
            margin: 0;
            color: white;
            font-size: 18px; 
            font-weight: 800;
            letter-spacing: 1px;
        }

        .footer-section {
            text-align: center;
            color: white;
        }

        .line {
            border: 0;
            height: 1px;
            background: rgba(255, 255, 255, 0.2);
            margin-bottom: 5px;
        }

        .footer-section h4 {
            margin: 0;
            font-size: 10px; 
            letter-spacing: 0.5px;
            font-weight: 600;
            color: #dfdfdf;
        }

        @media print {
            html, body {
                background: white !important;
                margin: 0 !important;
                padding: 0 !important;
                width: 210mm;
                height: 297mm;
            }

            .main-container {
                display: none !important;
            }

            .preview-container {
                display: block !important;
                width: 210mm !important;
            }

            .preview-area {
                gap: 0 !important;
                display: grid !important;
            }
            
            .a4-page {
                width: 210mm !important;
                height: 297mm !important;
                padding: 10mm !important;
                margin: 0 !important;
                box-shadow: none !important;
                border-radius: 0 !important;
                display: grid !important;
                page-break-after: always !important; 
                page-break-inside: avoid !important;
            }

            .book-cover {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
        }
    </style>
</head>
<body>

    <div class="main-container no-print">
        <h1>📚 Book Cover Generator</h1>
        <p>വിവരങ്ങൾ നൽകി പ്രൊഫഷണൽ കവർ പേജ് ഉണ്ടാക്കൂ!</p>
        
        <div class="form-container">
            <div class="input-group">
                <label>Student Photo:</label>
                <input type="file" id="inputPhoto" accept="image/*" onchange="loadPhoto(event)">
            </div>
            <div class="input-group">
                <label>Custom Backgrounds (Select Multiple):</label>
                <input type="file" id="inputBg" accept="image/*" multiple onchange="loadMultipleBackgrounds(event)">
                <span class="help-text">💡 Ctrl/Shift അമർത്തിപ്പിടിച്ച് ഒന്നിലധികം ചിത്രങ്ങൾ ഒരുമിച്ച് തിരഞ്ഞെടുക്കാം.</span>
            </div>
            <div class="input-group">
                <label>Student Name:</label>
                <input type="text" id="inputName" placeholder="TYPE NAME" oninput="updateCovers()">
            </div>
            <div class="input-group">
                <label>Class:</label>
                <input type="text" id="inputClass" placeholder="Class: 4 A" oninput="updateCovers()">
            </div>
            <div class="input-group">
                <label>Roll No:</label>
                <input type="text" id="inputRoll" placeholder="Roll: 10" oninput="updateCovers()">
            </div>
            <div class="input-group">
                <label>Subjects (One per line):</label>
                <textarea id="inputSubjects" rows="5" placeholder="MATHEMATICS&#10;ISLAMIC&#10;ENGLISH" oninput="updateCovers()"></textarea>
            </div>
            <div class="input-group">
                <label>School:</label>
                <input type="text" id="inputSchool" placeholder="SCHOOL NAME" oninput="updateCovers()">
            </div>
            
            <button class="print-btn" onclick="window.print()">🖨️ Download / Print Cover</button>
        </div>
    </div>

    <div class="preview-container">
        <div id="printArea" class="preview-area"></div>
    </div>

    <script>
        let studentPhotoData = "https://via.placeholder.com/150";
        // ഡിഫോൾട്ട് ബാക്ക്ഗ്രൗണ്ട് ഇമേജ് ലിസ്റ്റ്
        let customBgList = ["https://images.unsplash.com/photo-1511497584788-876760111969?q=80&w=1000&auto=format&fit=crop"];

        function updateCovers() {
            const name = document.getElementById('inputName').value || "MUHAMMED ZIYAD KV";
            const className = document.getElementById('inputClass').value ? "Class: " + document.getElementById('inputClass').value : "Class: 4 A";
            const roll = document.getElementById('inputRoll').value ? "Roll: " + document.getElementById('inputRoll').value : "Roll: 10";
            const school = document.getElementById('inputSchool').value.toUpperCase() || "JALALIYYA SCHOOL";
            
            const subjectsText = document.getElementById('inputSubjects').value;
            let subjects = subjectsText.split('\n').filter(sub => sub.trim() !== "");
            
            if(subjects.length === 0) {
                subjects = ["MATHEMATICS", "ISLAMIC", "ENGLISH"]; 
            }

            const printArea = document.getElementById('printArea');
            printArea.innerHTML = ""; 

            let currentPage;
            const slipsPerPage = 8; 

            subjects.forEach((subject, index) => {
                if (index % slipsPerPage === 0) {
                    currentPage = document.createElement('div');
                    currentPage.className = 'a4-page';
                    printArea.appendChild(currentPage);
                }

                // ഓരോ സബ്‌ജക്റ്റിനും വെവ്വേറെ ഇമേജ് നൽകുന്നു. 
                // അപ്‌ലോഡ് ചെയ്ത ചിത്രങ്ങളേക്കാൾ കൂടുതൽ സബ്‌ജക്റ്റ് ഉണ്ടെങ്കിൽ ലിസ്റ്റിലെ ആദ്യത്തെ ചിത്രം വീണ്ടും എടുക്കും.
                const currentBg = customBgList[index % customBgList.length];

                const slipHtml = `
                    <div class="book-cover" style="background-image: url('${currentBg}');">
                        <div class="cover-overlay">
                            <div class="top-section">
                                <div class="photo-box">
                                    <img src="${studentPhotoData}" alt="Student Photo">
                                </div>
                                <div class="student-info">
                                    <h2>${name}</h2>
                                    <p><span>${className}</span> | <span>${roll}</span></p>
                                </div>
                            </div>
                            <div class="subject-section">
                                <div class="sub-title">
                                    <span class="icon">📐</span>
                                    <h3>${subject.toUpperCase()}</h3>
                                </div>
                            </div>
                            <div class="footer-section">
                                <hr class="line">
                                <h4>${school}</h4>
                            </div>
                        </div>
                    </div>
                `;
                currentPage.innerHTML += slipHtml;
            });
        }

        function loadPhoto(event) {
            var reader = new FileReader();
            reader.onload = function() {
                studentPhotoData = reader.result;
                updateCovers();
            }
            if(event.target.files[0]) {
                reader.readAsDataURL(event.target.files[0]);
            }
        }

        // ഒന്നിലധികം ബാക്ക്ഗ്രൗണ്ട് ഇമേജുകൾ ഒന്നിച്ച് റീഡ് ചെയ്യാൻ
        function loadMultipleBackgrounds(event) {
            const files = event.target.files;
            if (files.length === 0) return;

            customBgList = []; // പഴയ ലിസ്റ്റ് ക്ലിയർ ചെയ്യുന്നു
            let loadedCount = 0;

            for (let i = 0; i < files.length; i++) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    customBgList.push(e.target.result);
                    loadedCount++;
                    
                    // എല്ലാ ചിത്രങ്ങളും ലോഡ് ആയിക്കഴിഞ്ഞാൽ കവർ അപ്‌ഡേറ്റ് ചെയ്യും
                    if (loadedCount === files.length) {
                        updateCovers();
                    }
                }
                reader.readAsDataURL(files[i]);
            }
        }

        window.onload = updateCovers;
    </script>
</body>
</html>
